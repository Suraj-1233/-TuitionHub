name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Backend Image Build & Push
    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/tuitionhub-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/tuitionhub-backend:${{ github.sha }}

    # Frontend Image Build & Push
    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/tuitionhub-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/tuitionhub-frontend:${{ github.sha }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/tuitionhub"

      - name: Execute Deploy Commands on EC2
        uses: appleboy/ssh-action@v1.0.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RAZORPAY_KEY: ${{ secrets.RAZORPAY_KEY }}
          RAZORPAY_SECRET: ${{ secrets.RAZORPAY_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          envs: DOCKERHUB_USERNAME,JWT_SECRET,RAZORPAY_KEY,RAZORPAY_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            # --- AUTO INSTALL DOCKER ---
            if ! command -v docker >/dev/null; then
              echo "Installing Docker..."
              if command -v apt-get >/dev/null; then
                sudo apt-get update -y
                sudo apt-get install -y docker.io docker-compose-plugin
              elif command -v yum >/dev/null; then
                sudo yum update -y
                sudo amazon-linux-extras install docker -y || sudo yum install docker -y
              fi
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            # --- INSTALL DOCKER COMPOSE IF MISSING ---
            if ! docker compose version >/dev/null 2>&1 && ! docker-compose version >/dev/null 2>&1; then
              echo "Installing Docker Compose..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi
            
            # Determine which command to use
            if sudo docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="sudo docker compose"
            else
              COMPOSE_CMD="sudo docker-compose"
            fi

            # Navigate to the project directory
            mkdir -p ~/tuitionhub
            cd ~/tuitionhub
            
            # Create/Update the .env file with secrets
            echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" > .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "RAZORPAY_KEY_ID=$RAZORPAY_KEY" >> .env
            echo "RAZORPAY_KEY_SECRET=$RAZORPAY_SECRET" >> .env
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env
            echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env
            
            # Log in to Docker Hub (optional if images are public, but safe if private)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Pull new images and restart containers
            $COMPOSE_CMD -f docker-compose.prod.yml pull backend frontend
            $COMPOSE_CMD -f docker-compose.prod.yml up -d
            
            # Clean up old unused images
            sudo docker image prune -a -f
