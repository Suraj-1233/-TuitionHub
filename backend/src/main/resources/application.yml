spring:
  application:
    name: tuitionhub-backend

  datasource:
    url: jdbc:mysql://localhost:3306/tuitionhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: tuition_user
    password: tuition_password

  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:TuitionHubSuperSecretKeyForJWTTokenGeneration2024!@#}
    expiration: 86400000  # 24 hours

  otp:
    expiry-minutes: 10

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://13.54.169.149:81,http://examsaas.in:81,https://examsaas.in:8443}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_SiPBsXu0irnw9K}
    key-secret: ${RAZORPAY_KEY_SECRET:EW9l7u1pyDst72EG6DPhJo23}


logging:
  level:
    com.tuitionhub: DEBUG
    org.springframework.security: WARN
