spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# JWT Security
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

# Razorpay
razorpay:
  key: ${RAZORPAY_KEY}
  secret: ${RAZORPAY_SECRET}

# Logging
logging:
  level:
    root: INFO
    com.tuitionhub: INFO
