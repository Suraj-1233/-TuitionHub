version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tuitionhub-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tuitionhub
      MYSQL_USER: tuition_user
      MYSQL_PASSWORD: tuition_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
