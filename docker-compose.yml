version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tuitionhub-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tuitionhub
      MYSQL_USER: tuition_user
      MYSQL_PASSWORD: tuition_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: tuitionhub-backend
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/tuitionhub
      DB_USERNAME: tuition_user
      DB_PASSWORD: tuition_password
      JWT_SECRET: your_super_secret_jwt_key_for_production
      RAZORPAY_KEY: ${RAZORPAY_KEY}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: tuitionhub-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
